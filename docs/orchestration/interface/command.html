<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LETHE 다음 지시문</title>
    <style>
      :root { --bg:#f7fbf8; --panel:#fff; --text:#17211c; --muted:#64706b; --line:#d9e1d7; --green:#1f6b4d; --amber:#916019; }
      * { box-sizing:border-box; }
      body { margin:0; background:var(--bg); color:var(--text); font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      main { width:min(980px,100%); margin:0 auto; padding:16px; }
      header { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:10px; }
      h1 { margin:0; font-size:20px; }
      a { color:var(--green); font-weight:900; text-decoration:none; }
      a:hover { text-decoration:underline; }
      .grid { display:grid; grid-template-columns:1.2fr .8fr; gap:10px; }
      article { min-width:0; padding:14px; border:1px solid var(--line); border-radius:8px; background:var(--panel); }
      h2 { margin:0 0 8px; color:var(--green); font-size:15px; }
      p, li { color:#26342f; font-size:14px; line-height:1.55; }
      ul { margin:0; padding-left:18px; }
      textarea { width:100%; min-height:190px; resize:vertical; border:1px solid var(--line); border-radius:8px; padding:10px; color:var(--text); background:#fff; font:13px/1.55 "Cascadia Code","SFMono-Regular",Consolas,monospace; }
      button { min-height:34px; margin-top:8px; border:1px solid #b9d2c3; border-radius:8px; background:var(--green); color:#fff; font-weight:900; cursor:pointer; }
      .warning { border-color:#e6d1ac; background:#fff8ec; }
      .warning h2 { color:var(--amber); }
      code { font-family:"Cascadia Code","SFMono-Regular",Consolas,monospace; }
      @media (max-width:760px) { .grid { grid-template-columns:1fr; } }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>다음 지시문</h1>
        <a href="./index.html">대시보드</a>
      </header>

      <div class="grid">
        <article>
          <h2>Codex에게 지금 지시할 말</h2>
          <textarea id="prompt-next" readonly>Dev_Prototype_v1에서 새 인트로 첫 화면을 직접 플레이 기준으로 확인하고, 카드 가독성/텍스트량/제목 존재감/무기 선택 의식감 중 가장 약한 한 가지만 골라 좁게 조정해줘. 새 시스템이나 새 콘텐츠는 추가하지 말고, Assets/_dev 범위에서만 진행해줘.</textarea>
          <button type="button" data-copy-target="prompt-next">프롬프트 복사</button>
        </article>

        <article class="warning">
          <h2>하지 말 것</h2>
          <ul>
            <li>새 무기, 새 기억, 새 잔향, 새 궁극 추가 금지</li>
            <li>상점, 메타 진행, 다중 지역, 최종 보스 추가 금지</li>
            <li><code>Assets/Lethe</code> 승격 금지</li>
          </ul>
        </article>

        <article>
          <h2>완료 기준</h2>
          <ul>
            <li>첫 화면이 LETHE 감성으로 읽힘</li>
            <li>무기 카드가 배경 위에서 잘 보임</li>
            <li>Unity compile error 0</li>
            <li>보고서와 상태 문서 갱신</li>
          </ul>
        </article>

        <article>
          <h2>문서</h2>
          <ul>
            <li><a href="../state/CURRENT_TASK.md">CURRENT_TASK.md</a></li>
            <li><a href="../state/NEXT_TASKS.md">NEXT_TASKS.md</a></li>
            <li><a href="../reports/20260710/index.html">오늘 보고서</a></li>
            <li><a href="../devlog/2026-07-10.md">오늘 devlog</a></li>
          </ul>
        </article>
      </div>
    </main>

    <script>
      document.querySelectorAll("[data-copy-target]").forEach((button) => {
        button.addEventListener("click", async () => {
          const target = document.getElementById(button.dataset.copyTarget);
          if (!target) return;
          target.select();
          await navigator.clipboard.writeText(target.value);
          button.textContent = "복사됨";
          setTimeout(() => { button.textContent = "프롬프트 복사"; }, 1200);
        });
      });
    </script>
  </body>
</html>
